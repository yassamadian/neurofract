<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroFract — Clinician Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #EBF0F7; color: #1A2B3C; min-height: 100vh; }

    header {
      background: #1A2B3C;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; }
    .logo h1 span.neuro { color: #EBF0F7; }
    .logo h1 span.fract { color: #4A6FA5; }
    .logo p { color: #9bb2ce; font-size: 13px; margin-top: 2px; }

    .sign-out-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1.5px solid #4A6FA5;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #9bb2ce;
      cursor: pointer;
    }

    .layout { display: flex; min-height: calc(100vh - 72px); }

    aside {
      width: 260px;
      background: #fff;
      border-right: 1px solid #d1dae8;
      padding: 24px 0;
      flex-shrink: 0;
    }

    .sidebar-title {
      padding: 0 20px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
    }

    .patient-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .patient-item:hover { background: #EBF0F7; }
    .patient-item.active { background: #EBF0F7; border-left-color: #4A6FA5; }
    .patient-item .name { font-weight: 600; font-size: 14px; }
    .patient-item .meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .patient-item .alert-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
    }

    main { flex: 1; padding: 28px; overflow-y: auto; }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: #6b7280;
    }
    .empty-state h3 { font-family: 'Lora', serif; margin-bottom: 8px; color: #1A2B3C; }

    .patient-header {
      background: #fff;
      border-radius: 14px;
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .patient-header h2 { font-family: 'Lora', serif; font-size: 22px; }
    .patient-header .tags { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: #EBF0F7;
      color: #4A6FA5;
    }
    .tag.alert { background: #fee2e2; color: #dc2626; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
    }
    .card h3 {
      font-family: 'Lora', serif;
      font-size: 16px;
      margin-bottom: 16px;
      color: #1A2B3C;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .score-row:last-child { border-bottom: none; }
    .score-label { font-size: 13px; color: #6b7280; }
    .score-value {
      font-weight: 700;
      font-size: 15px;
      padding: 3px 12px;
      border-radius: 20px;
    }
    .sv-ok { background: #d1fae5; color: #065f46; }
    .sv-warn { background: #fef3c7; color: #92400e; }
    .sv-alert { background: #fee2e2; color: #991b1b; }

    .alert-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .alert-box .alert-title { font-weight: 600; font-size: 14px; color: #dc2626; margin-bottom: 4px; }
    .alert-box .alert-body { font-size: 13px; color: #6b7280; line-height: 1.5; }

    .chart-container { position: relative; height: 200px; }

    canvas { width: 100% !important; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1><span class="neuro">Neuro</span><span class="fract">Fract</span></h1>
    <p id="clinician-name-display">Clinician Dashboard</p>
  </div>
  <button class="sign-out-btn" onclick="handleSignOut()">Sign out</button>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-title">Patients</div>
    <div id="patient-list"><div style="padding:20px;font-size:13px;color:#6b7280;">Loading patients...</div></div>
  </aside>

  <main id="main-content">
    <div class="empty-state">
      <h3>Select a patient</h3>
      <p>Choose a patient from the left panel to view their assessment history and clinical alerts.</p>
    </div>
  </main>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  doc, getDoc, collection, query, where, orderBy, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentClinicianId = null;
let allPatients = [];
let chartInstances = {};

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().role !== 'clinician') {
    window.location.href = 'login.html'; return;
  }
  currentClinicianId = user.uid;
  document.getElementById('clinician-name-display').textContent = snap.data().name;
  loadPatients();
});

window.handleSignOut = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

async function loadPatients() {
  // Load patients assigned to this clinician
  const q = query(collection(db, 'patients'), where('clinicianId', '==', currentClinicianId));
  const snap = await getDocs(q);

  // Also load all assessments to check for flags
  const assessQ = query(collection(db, 'assessments'), where('clinicianId', '==', currentClinicianId));
  const assessSnap = await getDocs(assessQ);
  const flaggedPatients = new Set(assessSnap.docs.filter(d => d.data().flagged).map(d => d.data().patientId));

  allPatients = snap.docs.map(d => ({ id: d.id, ...d.data(), flagged: flaggedPatients.has(d.id) }));

  const list = document.getElementById('patient-list');
  if (allPatients.length === 0) {
    list.innerHTML = '<div style="padding:20px;font-size:13px;color:#6b7280;">No patients assigned yet.</div>';
    return;
  }

  list.innerHTML = allPatients.map(p => `
    <div class="patient-item" id="pi-${p.id}" onclick="selectPatient('${p.id}')">
      <div class="name">${p.name}${p.flagged ? '<span class="alert-dot"></span>' : ''}</div>
      <div class="meta">${p.studyId || ''} · ${p.condition || 'Epilepsy'}</div>
    </div>
  `).join('');
}

window.selectPatient = async function(patientId) {
  document.querySelectorAll('.patient-item').forEach(el => el.classList.remove('active'));
  document.getElementById('pi-' + patientId)?.classList.add('active');

  const patient = allPatients.find(p => p.id === patientId);
  if (!patient) return;

  // Load assessments for this patient
  const q = query(
    collection(db, 'assessments'),
    where('patientId', '==', patientId),
    orderBy('date', 'asc')
  );
  const snap = await getDocs(q);
  const assessments = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  renderPatientView(patient, assessments);
};

function renderPatientView(patient, assessments) {
  const laep = assessments.filter(a => a.type === 'laep');
  const ssq  = assessments.filter(a => a.type === 'ssq');
  const qolie = assessments.filter(a => a.type === 'qolie');

  const lastLaep  = laep.at(-1);
  const lastSsq   = ssq.at(-1);
  const lastQolie = qolie.at(-1);

  const alerts = generateAlerts(patient, laep, ssq, qolie);

  const scoreCard = (label, val, unit, low, high, reverse) => {
    if (val === undefined) return `<div class="score-row"><span class="score-label">${label}</span><span class="score-value" style="background:#f3f4f6;color:#6b7280;">No data</span></div>`;
    let cls;
    if (!reverse) {
      cls = val < low ? 'sv-ok' : val < high ? 'sv-warn' : 'sv-alert';
    } else {
      cls = val >= high ? 'sv-ok' : val >= low ? 'sv-warn' : 'sv-alert';
    }
    return `<div class="score-row">
      <span class="score-label">${label}</span>
      <span class="score-value ${cls}">${typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(2)) : val} ${unit}</span>
    </div>`;
  };

  document.getElementById('main-content').innerHTML = `
    <div class="patient-header">
      <div>
        <h2>${patient.name}</h2>
        <div class="tags">
          <span class="tag">${patient.studyId || 'NF-???'}</span>
          <span class="tag">${patient.condition || 'Epilepsy'}</span>
          <span class="tag">${patient.device || 'Device not set'}</span>
          ${alerts.length ? `<span class="tag alert">⚠ ${alerts.length} alert${alerts.length > 1 ? 's' : ''}</span>` : ''}
        </div>
      </div>
      <div style="text-align:right;font-size:13px;color:#6b7280;">
        ${assessments.length} assessment${assessments.length !== 1 ? 's' : ''} completed
      </div>
    </div>

    ${alerts.length ? `
    <div class="card" style="margin-bottom:20px;border-left:4px solid #ef4444;">
      <h3 style="color:#dc2626;">⚠ Clinical Alerts</h3>
      ${alerts.map(a => `
        <div class="alert-box">
          <div class="alert-title">${a.title}</div>
          <div class="alert-body">${a.body}</div>
        </div>
      `).join('')}
    </div>` : ''}

    <div class="grid-2">
      <div class="card">
        <h3>Latest Scores</h3>
        ${scoreCard('LAEP (side effects)', lastLaep?.score, '', 36.5, 45, false)}
        ${scoreCard('SSQ (seizure severity)', lastSsq?.score, '', 3, 5, false)}
        ${scoreCard('QOLIE-31 (quality of life)', lastQolie?.score, '', 40, 60, true)}
        <div style="font-size:11px;color:#9ca3af;margin-top:12px;">Thresholds: LAEP ≥36.5 (Romoli 2018) · SSQ ≥5 · QOLIE <40</div>
      </div>
      <div class="card">
        <h3>LAEP Trend</h3>
        <div class="chart-container"><canvas id="chart-laep"></canvas></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>SSQ Trend</h3>
        <div class="chart-container"><canvas id="chart-ssq"></canvas></div>
      </div>
      <div class="card">
        <h3>QOLIE-31 Trend</h3>
        <div class="chart-container"><canvas id="chart-qolie"></canvas></div>
      </div>
    </div>
  `;

  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  renderChart('chart-laep', laep, '#4A6FA5', 'LAEP Score', [
    { value: 36.5, color: '#f59e0b', label: 'Discontinuation risk' },
    { value: 45, color: '#ef4444', label: 'Toxicity risk' }
  ], 19, 76);

  renderChart('chart-ssq', ssq, '#37577F', 'SSQ Score', [
    { value: 5, color: '#ef4444', label: 'Severe' }
  ], 1, 7);

  renderChart('chart-qolie', qolie, '#4A6FA5', 'QOLIE-31 Score', [
    { value: 59.8, color: '#10b981', label: 'Global mean (Gao 2016)' },
    { value: 40, color: '#f59e0b', label: 'Significant impact' }
  ], 0, 100);
}

function renderChart(canvasId, data, color, label, thresholds, yMin, yMax) {
  const ctx = document.getElementById(canvasId)?.getContext('2d');
  if (!ctx) return;

  const labels = data.map(d => {
    const dt = d.date?.toDate ? d.date.toDate() : new Date();
    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  });
  const values = data.map(d => d.score);

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels.length ? labels : ['No data'],
      datasets: [{
        label,
        data: values,
        borderColor: color,
        backgroundColor: color + '20',
        borderWidth: 2,
        pointRadius: 5,
        pointBackgroundColor: color,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        annotation: {}
      },
      scales: {
        y: {
          min: yMin,
          max: yMax,
          grid: { color: '#f3f4f6' }
        },
        x: { grid: { display: false } }
      }
    }
  });

  // Draw threshold lines manually via afterDraw
  // (annotation plugin not loaded — using a simpler approach)
}

function generateAlerts(patient, laep, ssq, qolie) {
  const alerts = [];

  // Alert 1: LAEP threshold
  const lastLaep = laep.at(-1);
  if (lastLaep?.score >= 45) {
    alerts.push({
      title: 'LAEP ≥45 — Toxicity Risk',
      body: `${patient.name}'s latest LAEP score is ${lastLaep.score}, associated with suicidality risk (Kwon et al. 2019). Consider urgent medication review.`
    });
  } else if (lastLaep?.score >= 36.5) {
    alerts.push({
      title: 'LAEP ≥36.5 — Discontinuation Risk',
      body: `Score of ${lastLaep.score} predicts treatment discontinuation with 85% accuracy (Romoli et al. 2018). Consider medication adjustment.`
    });
  }

  // Alert 2: LAEP trajectory
  if (laep.length >= 3) {
    const recent = laep.slice(-3).map(a => a.score);
    const slope = (recent[2] - recent[0]) / 2;
    if (slope > 0.5) {
      const weeksTo36 = lastLaep?.score < 36.5 ? Math.round((36.5 - lastLaep.score) / slope) : null;
      alerts.push({
        title: 'Rising LAEP Trajectory',
        body: `LAEP rising ~${slope.toFixed(1)} pts/assessment. ${weeksTo36 ? `Projected to cross dropout threshold in ~${weeksTo36} assessments.` : 'Already above dropout threshold.'}`
      });
    }
  }

  // Alert 3: SSQ-LAEP divergence
  if (laep.length >= 2 && ssq.length >= 2) {
    const laepTrend = laep.at(-1).score - laep.at(-2).score;
    const ssqTrend = ssq.at(-1).score - ssq.at(-2).score;
    if (laepTrend > 0 && ssqTrend < 0) {
      alerts.push({
        title: 'SSQ-LAEP Divergence',
        body: 'Seizure severity is improving while side effects are worsening. Treatment may be effective but medication burden is increasing. Consider dose optimisation.'
      });
    }
  }

  // Alert 4: QOLIE cognitive decline
  if (qolie.length >= 2) {
    const lastQ = qolie.at(-1);
    const prevQ = qolie.at(-2);
    const overallChange = lastQ.score - prevQ.score;
    if (overallChange > -8) {
      const cogLast = lastQ.answers?.slice(16, 22);
      const cogPrev = prevQ.answers?.slice(16, 22);
      if (cogLast && cogPrev) {
        const cogChangeLast = cogLast.reduce((a,b)=>a+b,0)/cogLast.length;
        const cogChangePrev = cogPrev.reduce((a,b)=>a+b,0)/cogPrev.length;
        if (cogChangePrev - cogChangeLast >= 1) {
          alerts.push({
            title: 'Isolated Cognitive Decline',
            body: 'QOLIE-31 cognitive subscale has declined while overall score is stable. May indicate subclinical seizures or medication toxicity. Consider neuropsychology referral.'
          });
        }
      }
    }
  }

  // Alert 5: Completion gap
  if (laep.length > 0) {
    const lastDate = laep.at(-1).date?.toDate ? laep.at(-1).date.toDate() : new Date();
    const weeksSince = Math.floor((Date.now() - lastDate.getTime()) / (7 * 24 * 60 * 60 * 1000));
    if (weeksSince >= 2) {
      alerts.push({
        title: 'Assessment Gap — ' + weeksSince + ' Weeks',
        body: `${patient.name} has not completed a LAEP assessment in ${weeksSince} weeks. Non-completion correlates with depression and treatment abandonment.`
      });
    }
  }

  return alerts;
}
</script>
</body>
</html>
