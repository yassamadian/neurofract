<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroFract — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #EBF0F7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(74,111,165,0.10);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 700;
    }

    .logo h1 span.neuro { color: #1A2B3C; }
    .logo h1 span.fract { color: #4A6FA5; }

    .logo p {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #EBF0F7;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab.active {
      color: #4A6FA5;
      border-bottom-color: #4A6FA5;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1A2B3C;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #1A2B3C;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #4A6FA5;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: #4A6FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #37577F; }
    .btn:disabled { background: #9bb2ce; cursor: not-allowed; }

    .error {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .error.show { display: block; }

    .panel { display: none; }
    .panel.active { display: block; }

    .role-note {
      font-size: 13px;
      color: #6b7280;
      margin-top: 16px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1><span class="neuro">Neuro</span><span class="fract">Fract</span></h1>
    <p>The Virtual Neuromodulation Clinic</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <div id="error-msg" class="error"></div>

  <!-- LOGIN PANEL -->
  <div id="panel-login" class="panel active">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>

  <!-- REGISTER PANEL -->
  <div id="panel-register" class="panel">
    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="reg-name" placeholder="Dr Jane Smith" />
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="reg-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 8 characters" />
    </div>
    <div class="form-group">
      <label>I am a...</label>
      <select id="reg-role">
        <option value="patient">Patient</option>
        <option value="clinician">Clinician</option>
        <option value="researcher">Researcher</option>
      </select>
    </div>
    <button class="btn" id="reg-btn" onclick="handleRegister()">Create Account</button>
    <p class="role-note">Clinician and researcher accounts require verification before full access is granted.</p>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // Redirect if already logged in
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) {
        redirectByRole(userDoc.data().role);
      }
    }
  });

  function redirectByRole(role) {
    if (role === 'patient') window.location.href = 'patient-dashboard.html';
    else if (role === 'clinician') window.location.href = 'clinician-dashboard.html';
    else if (role === 'researcher') window.location.href = 'researcher-dashboard.html';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('show');
  }

  window.switchTab = function(tab) {
    hideError();
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  };

  window.handleLogin = async function() {
    hideError();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
      if (userDoc.exists()) {
        redirectByRole(userDoc.data().role);
      } else {
        showError('Account setup incomplete. Please contact support.');
      }
    } catch (e) {
      showError(friendlyError(e.code));
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  };

  window.handleRegister = async function() {
    hideError();
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const role = document.getElementById('reg-role').value;
    const btn = document.getElementById('reg-btn');

    if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = cred.user.uid;

      // Save user profile to Firestore
      await setDoc(doc(db, 'users', uid), {
        name,
        email,
        role,
        createdAt: serverTimestamp()
      });

      // If patient, create patient record too
      if (role === 'patient') {
        await setDoc(doc(db, 'patients', uid), {
          name,
          email,
          studyId: 'NF-' + String(Math.floor(Math.random() * 9000) + 1000),
          consentGiven: false,
          createdAt: serverTimestamp()
        });
        window.location.href = 'patient-dashboard.html';
      } else {
        redirectByRole(role);
      }
    } catch (e) {
      showError(friendlyError(e.code));
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  };

  function friendlyError(code) {
    switch (code) {
      case 'auth/invalid-credential':
      case 'auth/wrong-password':
      case 'auth/user-not-found': return 'Incorrect email or password.';
      case 'auth/email-already-in-use': return 'An account with this email already exists.';
      case 'auth/weak-password': return 'Password must be at least 8 characters.';
      case 'auth/invalid-email': return 'Please enter a valid email address.';
      case 'auth/too-many-requests': return 'Too many attempts. Please try again in a few minutes.';
      default: return 'Something went wrong. Please try again.';
    }
  }
</script>
</body>
</html>
