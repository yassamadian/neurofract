<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroFract — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1E3A5F;
      border-radius: 20px;
      padding: 44px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(37,99,235,0.12);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo h1 {
      font-family: 'Lora', serif;
      font-size: 30px;
      font-weight: 700;
    }
    .logo h1 .neuro { color: #EFF6FF; }
    .logo h1 .fract { color: #2563EB; }
    .logo p { color: #94A3B8; font-size: 14px; margin-top: 6px; }

    .tabs {
      display: flex;
      border-bottom: 2px solid #152642;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: #94A3B8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: #2563EB; border-bottom-color: #2563EB; }

    .panel { display: none; }
    .panel.active { display: block; }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #EFF6FF;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #243F6B;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #EFF6FF;
      background: #0D1F38;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #2563EB; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #2563EB;
      color: #EFF6FF;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #a0b4cc; cursor: not-allowed; }

    .error-msg {
      background: #1c0606;
      color: #F87171;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.show { display: block; }

    .role-note {
      font-size: 13px;
      color: #94A3B8;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1><span class="neuro">Neuro</span><span class="fract">Fract</span></h1>
    <p>The Virtual Neuromodulation Clinic</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign in</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <!-- SIGN IN -->
  <div id="panel-login" class="panel active">
    <div class="form-group">
      <label for="login-email">Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign in</button>
  </div>

  <!-- REGISTER -->
  <div id="panel-register" class="panel">
    <div class="form-group">
      <label for="reg-name">Full name</label>
      <input type="text" id="reg-name" placeholder="Your name" autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="reg-email">Email address</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label for="reg-role">I am a…</label>
      <select id="reg-role">
        <option value="patient">Patient</option>
        <option value="clinician">Clinician</option>
        <option value="researcher">Researcher</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-register" onclick="doRegister()">Create account</button>
    <p class="role-note">Clinician and researcher accounts are reviewed before full access is granted.</p>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  doc, getDoc, setDoc, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// Redirect if already logged in
onAuthStateChanged(auth, async user => {
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) redirectByRole(snap.data().role);
  }
});

function redirectByRole(role) {
  if (role === 'patient') location.href = 'patient.html';
  else if (role === 'clinician') location.href = 'clinician.html';
  else if (role === 'researcher') location.href = 'researcher.html';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('error-msg').classList.remove('show');
}

window.switchTab = function(tab) {
  clearError();
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
};

window.doLogin = async function() {
  clearError();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const snap = await getDoc(doc(db, 'users', cred.user.uid));
    if (snap.exists()) redirectByRole(snap.data().role);
    else showError('Account not found. Please contact support.');
  } catch(e) {
    showError(friendlyError(e.code));
    btn.disabled = false; btn.textContent = 'Sign in';
  }
};

window.doRegister = async function() {
  clearError();
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;

  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      name, email, role, createdAt: serverTimestamp()
    });
    redirectByRole(role);
  } catch(e) {
    showError(friendlyError(e.code));
    btn.disabled = false; btn.textContent = 'Create account';
  }
};

function friendlyError(code) {
  switch(code) {
    case 'auth/invalid-credential':
    case 'auth/wrong-password':
    case 'auth/user-not-found': return 'Incorrect email or password.';
    case 'auth/email-already-in-use': return 'An account with this email already exists.';
    case 'auth/weak-password': return 'Password must be at least 8 characters.';
    case 'auth/invalid-email': return 'Please enter a valid email address.';
    case 'auth/too-many-requests': return 'Too many attempts. Please try again in a few minutes.';
    default: return 'Something went wrong. Please try again.';
  }
}
</script>
</body>
</html>
